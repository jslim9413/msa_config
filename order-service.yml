# k8s
spring:
  kafka:
    bootstrap-servers: kafka-service:9092   # ⭐ 필수 수정

feign:
  circuitbreaker:
    enabled: true 

resilience4j:
  circuitbreaker:
    instances:
      productService:
        failure-rate-threshold: 40
        wait-duration-in-open-state: 10s
        sliding-window-size: 10
        minimum-number-of-calls: 5